version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: assignment-postgres
    environment:
      POSTGRES_DB: virality_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - assignment-network

  redis:
    image: redis:7-alpine
    container_name: assignment-redis
    ports:
      - "6379:6379"
    networks:
      - assignment-network

volumes:
  postgres_data:

networks:
  assignment-network:
    driver: bridge
